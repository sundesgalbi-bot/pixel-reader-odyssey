<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- Désactive le zoom utilisateur pour une expérience type application native -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
 
  <!-- Métadonnées PWA (Android / iOS) -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PixelReader" />
  <meta name="theme-color" content="#1a1040" />
  <meta name="description" content="Lis des livres, bâtis ton monde en pixel art" />
 
  <title>Pixel-Reader Odyssey</title>
 
  <!-- Icônes PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
 
  <style>
    /* ── Reset & fondations ─────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
 
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1040; /* Couleur de fond pendant le chargement */
      font-family: 'Courier New', monospace; /* Cohérence pixel art */
    }
 
    /* Conteneur Phaser — occupe tout l'écran */
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    /* Le canvas Phaser doit être centré sans barre de défilement */
    #game-container canvas {
      display: block;
      image-rendering: pixelated;  /* Rendu pixel art net sur tous les navigateurs */
      image-rendering: crisp-edges;
    }
 
    /* ── Écran de chargement (affiché avant Phaser) ─────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #1a1040;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
 
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
 
    .loading-title {
      color: #AFA9EC;
      font-size: clamp(18px, 5vw, 28px);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
 
    .loading-bar-wrapper {
      width: 200px;
      height: 8px;
      background: #2d1f6e;
      border: 1px solid #4a3f8c;
      border-radius: 4px;
      overflow: hidden;
    }
 
    .loading-bar {
      height: 100%;
      background: #7F77DD;
      border-radius: 4px;
      animation: loadBar 1.5s ease-in-out infinite;
    }
 
    @keyframes loadBar {
      0%   { width: 0%; }
      50%  { width: 80%; }
      100% { width: 100%; }
    }
 
    .loading-subtitle {
      color: #9990CC;
      font-size: 11px;
      letter-spacing: 2px;
      margin-top: 12px;
    }
 
    /* ── Formulaire d'ajout de livre (overlay HTML) ─────────── */
    #book-overlay {
      display: none; /* Affiché via JS */
      position: fixed;
      inset: 0;
      background: rgba(10, 6, 30, 0.85);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
 
    #book-overlay.active {
      display: flex;
    }
 
    .book-modal {
      background: #1e1354;
      border: 1px solid #4a3f8c;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      color: #EDE8FF;
      box-shadow: 0 0 40px rgba(127, 119, 221, 0.3);
    }
 
    .book-modal h2 {
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #AFA9EC;
      margin-bottom: 20px;
      text-align: center;
    }
 
    .form-group {
      margin-bottom: 14px;
    }
 
    .form-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9990CC;
      margin-bottom: 6px;
    }
 
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      background: #2d1f6e;
      border: 1px solid #4a3f8c;
      border-radius: 8px;
      color: #EDE8FF;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      /* Supprime le look natif sur iOS */
      -webkit-appearance: none;
      appearance: none;
    }
 
    .form-group input:focus,
    .form-group select:focus {
      border-color: #7F77DD;
    }
 
    /* Étoiles de notation */
    .star-rating {
      display: flex;
      gap: 8px;
    }
 
    .star-rating input[type="radio"] {
      display: none;
    }
 
    .star-rating label {
      font-size: 24px;
      cursor: pointer;
      color: #4a3f8c;
      transition: color 0.15s, transform 0.15s;
      user-select: none;
    }
 
    .star-rating label:hover,
    .star-rating label:hover ~ label,
    .star-rating input:checked ~ label {
      color: #4a3f8c; /* Reset */
    }
 
    .star-rating label:hover,
    .star-rating input:checked + label,
    .star-rating label.active {
      color: #F2A623;
      transform: scale(1.2);
    }
 
    /* Boutons du formulaire */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
 
    .btn-primary {
      flex: 1;
      padding: 12px;
      background: #7F77DD;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
 
    .btn-primary:active {
      background: #534AB7;
      transform: scale(0.97);
    }
 
    .btn-cancel {
      padding: 12px 18px;
      background: #2d1f6e;
      border: 1px solid #4a3f8c;
      border-radius: 10px;
      color: #9990CC;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      cursor: pointer;
    }
 
    /* ── Toast de notification ──────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2d1f6e;
      border: 1px solid #7F77DD;
      color: #AFA9EC;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
 
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
 
  <!-- Écran de chargement affiché pendant l'initialisation de Phaser -->
  <div id="loading-screen">
    <div class="loading-title">📚 Pixel-Reader</div>
    <div class="loading-bar-wrapper">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-subtitle">chargement du monde...</div>
  </div>
 
  <!-- Conteneur principal du jeu Phaser -->
  <div id="game-container"></div>
 
  <!-- Overlay formulaire "Ajouter un livre" (géré depuis UIScene.js) -->
  <div id="book-overlay">
    <div class="book-modal">
      <h2>📖 Nouveau livre</h2>
 
      <div class="form-group">
        <label for="f-title">Titre du livre</label>
        <input type="text" id="f-title" placeholder="Ex: Le Seigneur des Anneaux" autocomplete="off" />
      </div>
 
      <div class="form-group">
        <label for="f-author">Auteur</label>
        <input type="text" id="f-author" placeholder="Ex: J.R.R. Tolkien" autocomplete="off" />
      </div>
 
      <div class="form-group">
        <label for="f-pages">Nombre de pages</label>
        <input type="number" id="f-pages" placeholder="Ex: 1200" min="1" max="9999" />
      </div>
 
      <div class="form-group">
        <label for="f-genre">Genre</label>
        <select id="f-genre">
          <option value="Fantasy">⚔️ Fantasy</option>
          <option value="SciFi">🚀 Science-Fiction</option>
          <option value="Policier">🔍 Policier / Thriller</option>
          <option value="Romance">💖 Romance</option>
          <option value="NonFiction">📊 Non-fiction</option>
          <option value="Horreur">👻 Horreur</option>
          <option value="Histoire">🏛️ Histoire</option>
          <option value="DevPerso">🌿 Développement perso</option>
        </select>
      </div>
 
      <div class="form-group">
        <label>Ta note</label>
        <div class="star-rating" id="star-rating">
          <!-- Les étoiles sont générées en JS pour plus de maintenabilité -->
        </div>
      </div>
 
      <div class="btn-row">
        <button class="btn-cancel" onclick="window.closeBookForm()">Annuler</button>
        <button class="btn-primary" onclick="window.submitBook()">CONSTRUIRE !</button>
      </div>
    </div>
  </div>
 
  <!-- Toast de notification -->
  <div id="toast"></div>
 
  <!-- ──────────────────────────────────────────────────────────
       Phaser 3.60 via CDN jsDelivr (stable, pas de clé requise)
       ────────────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
 
  <!-- Point d'entrée de l'application -->
  <script type="module" src="src/main.js"></script>
 
  <!-- Enregistrement du Service Worker pour le mode hors-ligne -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('[PWA] Service Worker enregistré:', reg.scope))
          .catch(err => console.warn('[PWA] Échec Service Worker:', err));
      });
    }
  </script>
 
</body>
</html>
