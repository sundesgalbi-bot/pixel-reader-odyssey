# ─────────────────────────────────────────────────────────────────────────────
# Fichier : .github/workflows/deploy.yml
# Rôle    : Déploie automatiquement le projet sur GitHub Pages
#           à chaque push sur la branche principale (main).
# ─────────────────────────────────────────────────────────────────────────────
 
name: 🚀 Déployer sur GitHub Pages
 
on:
  push:
    branches:
      - main          # Se déclenche uniquement sur la branche principale
  workflow_dispatch:  # Permet aussi un déclenchement manuel depuis l'interface GitHub
 
# Permissions minimales requises pour écrire sur gh-pages
permissions:
  contents: write
 
jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
 
    steps:
      # ── Étape 1 : Récupérer le code source ──────────────────────────────
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
 
      # ── Étape 2 : (Optionnel) Valider la structure des fichiers ──────────
      - name: 🔍 Vérification de la structure
        run: |
          echo "Fichiers présents à la racine :"
          ls -la
          echo ""
          echo "Vérification index.html..."
          test -f index.html && echo "✅ index.html trouvé" || echo "❌ index.html manquant !"
          test -f manifest.json && echo "✅ manifest.json trouvé" || echo "❌ manifest.json manquant !"
 
      # ── Étape 3 : Déploiement sur la branche gh-pages ───────────────────
      # peaceiris/actions-gh-pages est la solution la plus fiable et simple.
      # Elle crée / met à jour automatiquement la branche gh-pages.
      - name: 🌐 Déploiement sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./          # Tout le contenu du dépôt est publié
          publish_branch: gh-pages # Branche de destination GitHub Pages
          commit_message: "deploy: mise à jour automatique 🚀"
          # Garde un historique propre (1 seul commit = état actuel)
          force_orphan: true
 